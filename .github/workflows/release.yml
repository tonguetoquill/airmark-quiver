name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read package version
        id: version
        run: |
          NEXT=$(node -p "require('./package.json').version")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing v${NEXT}"

      - name: Tag and push
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Extract release notes
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          awk -v v="## v${VERSION}" \
            '$0 ~ "^"v {f=1; next} /^## / && f {exit} f {print}' \
            CHANGELOG.md > notes.md || true
          [ -s notes.md ] || echo "Release v${VERSION}" > notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          if [[ "$VERSION" == *-* ]]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file notes.md \
              --prerelease
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file notes.md \
              --latest
          fi

  publish-npm:
    needs: [prepare]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Upgrade npm for Trusted Publishers
        run: npm install -g npm@latest

      - name: Publish @airmark/quiver (trusted publisher, with provenance)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
