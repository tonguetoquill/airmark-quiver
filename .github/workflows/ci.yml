name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Render preview gallery
        run: npm run preview

      - name: Upload preview gallery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-gallery
          path: preview/
