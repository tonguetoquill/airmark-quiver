quill:
  name: usaf_memo
  version: 0.2.0
  backend: typst
  plate_file: plate.typ
  description: U.S. Air Force and Space Force Official Memorandum

main:
  body:
    example: |
      The first paragraph. Top-level paragraphs are auto-numbered; do not add manual numbering.

      - Nested bullets are automatically lettered.
  fields:
    memo_for:
      type: array
      default: []
      example:
        - ORG1/SYMBOL
        - ORG2/SYMBOL
      ui:
        group: Addressing
      description: "Organization/office symbol in UPPERCASE. To address a specific person, add their rank and name in parentheses (e.g., 'ORG/SYMBOL (LT COL JANE DOE)'). For numerous recipients, use 'DISTRIBUTION'."

    memo_from:
      type: array
      default: []
      example:
        - ORG/SYMBOL
        - Organization Name
        - 123 Street Ave
        - City ST 12345-6789
      ui:
        group: Addressing
      description: "If recipients are on the same installation, use only the office symbol. For recipients on other installations, include the full mailing address to enable return correspondence. Omit entirely to produce a Memorandum for Record (no MEMO FROM line)."

    subject:
      type: string
      default: ""
      example: Subject of the Memorandum
      ui:
        group: Addressing
      description: Be brief and clear. Capitalize the first letter of each word except articles, prepositions, and conjunctions. Include suspense dates in parentheses if applicable.

    signature_block:
      type: array
      default: []
      example:
        - "FIRST M. LAST, Rank, USSF"
        - Duty Title
      ui:
        group: Addressing
      description: "Line 1: Name in UPPERCASE as signed, grade, and service. Line 2: Duty title. Spell out 'Colonel' and general officer ranks."

    letterhead_title:
      type: string
      default: DEPARTMENT OF THE AIR FORCE
      ui:
        group: Letterhead
      description: Standard title. Only change for Joint Commands or DoW Agencies.

    letterhead_caption:
      type: array
      default:
        - HEADQUARTERS [UNIT NAME]
      ui:
        group: Letterhead
      description: The full organization name of your unit.

    letterhead_seal:
      type: string
      enum:
        - dow
        - dod
      default: dow
      ui:
        group: Letterhead
        compact: true
      description: Department of War (DoW) or Department of Defense (DoD) seal shown in the letterhead.

    letterhead_seal_subtitle:
      type: string
      default: ""
      ui:
        group: Letterhead
        compact: true
      description: Optional line below the DoW seal (bold caps). Leave blank to omit.

    tag_line:
      type: string
      default: ""
      ui:
        group: Letterhead
        compact: true
      description: Organizational motto at the bottom of the page.

    freedom250:
      type: boolean
      default: false
      ui:
        group: Letterhead
        compact: true
      description: Show the America 250 / Freedom 250 commemorative emblem in the letterhead, mirrored opposite the seal.

    references:
      type: array
      default: []
      example:
        - "AFM 33-326, 31 July 2019, Preparing Official Communications"
      ui:
        group: Additional
      description: "Cite by organization, type, date, and title."

    cc:
      type: array
      default: []
      example:
        - Rank and Name, ORG/SYMBOL
      ui:
        group: Additional
      description: List office symbols of recipients to receive copies.

    distribution:
      type: array
      default: []
      example:
        - ORG1/SYMBOL
        - ORG2/SYMBOL
      ui:
        group: Additional
      description: Complete list of recipients if 'SEE DISTRIBUTION' is used in the 'Memo For' field.

    attachments:
      type: array
      default: []
      example:
        - Attachment description, YYYY MMM DD
      ui:
        group: Additional
      description: List attachments in the order they are mentioned in the memo. Briefly describe each; do not use 'as stated' or abbreviations.

    memo_style:
      type: string
      enum:
        - usaf
        - daf
      default: usaf
      ui:
        group: Additional
        compact: true
      description: "USAF memorandum (default) or DAF headquarters memorandum. DAF changes date formatting and body paragraph layout per AFH 33-337."

    font_size:
      type: number
      default: 12
      example: 12
      ui:
        group: Additional
        compact: true
      description: Font size for the memo text (pt). Decimal values (e.g. 11.5) are supported.

    date:
      type: date
      default: ""
      ui:
        group: Additional
        compact: true
      description: YYYY-MM-DD. Leave blank to use today's date.

    classification:
      type: string
      enum:
        - ""
        - UNCLASSIFIED
        - CUI
        - CONFIDENTIAL
        - SECRET
        - TOP SECRET
      default: ""
      ui:
        group: Additional
        compact: true
      description: "Select the classification marking displayed in the header/footer banner. Banner colors follow DoD/CAPCO marking guidance (UNCLASSIFIED green, CUI/CONFIDENTIAL black, SECRET red, TOP SECRET orange). Follow AFI 31-401 and applicable DoD guidance. Leave blank to omit the banner."

    dissemination:
      type: string
      default: ""
      ui:
        group: Additional
        compact: true
      description: "Banner dissemination suffix appended after double slash (e.g. 'NF' renders as CUI//NF in the header/footer). Leave blank for no suffix."

    cui_controlled_by:
      type: string
      default: ""
      ui:
        group: Additional
        compact: true
      description: "Office or organization that designated this information as CUI (e.g., 'SAF/AA'). Required by DoDM 5200.48 when classification is CUI."

    cui_category:
      type: string
      default: ""
      ui:
        group: Additional
        compact: true
      description: "CUI category from the DoD CUI Registry (e.g., 'Privacy/MED', 'CTI', 'PRVCY'). Leave blank to omit."

    cui_limited_dissemination:
      type: string
      default: ""
      ui:
        group: Additional
        compact: true
      description: "Limited dissemination control shown in the indicator block (e.g., 'FEDONLY', 'NOFORN'). Independent from the banner suffix above."

    cui_poc:
      type: string
      default: ""
      ui:
        group: Additional
        compact: true
      description: "Point of contact for CUI questions (e.g., 'Capt J. Smith, DSN 555-1234, john.smith@us.af.mil'). Required by DoDM 5200.48 when classification is CUI."

card_kinds:
  indorsement:
    description: Chain of routing endorsements. Each endorsement block adds an official response or forwarding action to the original memo.
    ui:
      title: Routing indorsement
    fields:
      from:
        type: string
        default: ORG/SYMBOL
        ui:
          group: Addressing
        description: "Office symbol or Rank Name of the endorsing official (e.g., 'ORG/SYMBOL')."
      for:
        type: string
        default: ORG/SYMBOL
        ui:
          group: Addressing
        description: Office symbol or organization receiving the endorsed memo.
      signature_block:
        type: array
        default:
          - "FIRST M. LAST, Rank, USAF"
          - Duty Title
        example:
          - "FIRST M. LAST, Rank, USAF"
          - Duty Title
        ui:
          group: Addressing
        description: "Line 1: Name in UPPERCASE as signed, grade, and service. Line 2: Duty title."
      format:
        type: string
        enum:
          - standard
          - informal
          - separate_page
        default: standard
        ui:
          group: Additional
        description: "Format style: 'standard' (formal on same page), 'informal' (less formal routing), or 'separate_page' (starts on new page)."
      action:
        type: string
        enum:
          - ""
          - undecided
          - approve
          - disapprove
        default: ""
        ui:
          group: Addressing
        description: "Action taken by the endorser. Leave blank to hide the Approve/Disapprove line entirely, 'undecided' to display the line with neither option circled, 'approve' or 'disapprove' to circle the selected option."
      attachments:
        type: array
        default: []
        ui:
          group: Additional
        description: List of attachments specific to this endorsement.
      cc:
        type: array
        default: []
        ui:
          group: Additional
        description: List of office symbols to receive copies of this endorsement.
      date:
        type: date
        default: ""
        ui:
          group: Additional
        description: "YYYY-MM-DD. Date the endorser signs/forwards the memo (per AFH 33-337 Ch. 14, this is distinct from the originating memo's date). Leave blank to use today's date."
