quill:
  name: daf1206
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  description: "DAF Form 1206 — Nomination for Award"

main:
  body:
    example: |
      - First accomplishment bullet.
      - Second accomplishment bullet.
  fields:
    award:
      type: string
      default: ""
      example: Outstanding Performer of the Quarter
    category_if_applicable:
      type: string
      default: ""
      ui:
        compact: true
    award_period:
      type: string
      default: ""
      example: 1 Jan 2026 – 31 Mar 2026
      ui:
        compact: true
    rankname_of_nominee:
      type: string
      default: ""
      example: "SSgt John A. Doe"
      ui:
        compact: true
    majcom_fldcom_foa_or_dru:
      type: string
      default: ""
      example: ACC
      ui:
        compact: true
    dafsc_duty_title:
      type: string
      default: ""
      example: "1C5X1, Aerospace Control and Warning Systems"
    nominees_telephone_dsn_commercial:
      type: string
      default: ""
      example: "DSN 555-1234 / (555) 555-1234"
    unit_office_symbol_street_address_base_state_zip:
      type: string
      default: ""
      example: "1st ACS, 123 Main St, Tyndall AFB FL 32403"
    unit_commander_rank_name_and_telephone:
      type: string
      default: ""
      example: "Lt Col Jane B. Smith, (555) 555-5678"

card_kinds:
  accomplishments_continued:
    description: Optional. Add this card only when page 2 overflow is required. Use the card body for continued bullets. Rank/name on page 2 matches the main nominee line automatically.
    ui:
      title: Specific Accomplishments (Continued — Page 2)
    body:
      example: |
        - Continued accomplishment bullet.
