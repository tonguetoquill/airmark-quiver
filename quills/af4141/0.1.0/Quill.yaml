quill:
  name: af4141
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  example_file: example.md
  description: "AF Form 4141 — Individual's Record of Duties and Experience, Ground Environment Personnel"

main:
  body:
    enabled: false
    description: Unused. This form is built from structured fields only.
  fields:
    name:
      type: string
      required: true
      description: Full name in Last, First, Middle Initial format.

    unit:
      type: string
      required: true
      description: Unit or organization of assignment.

    grade:
      type: string
      description: Current grade or CCC level.

    commanders_auth:
      type: string
      description: Commander's authentication entry on page 1.

card_types:
  experience:
    description: Each card represents one row in the Record of Experience table. Rows fill page 1 (up to 16 rows) then page 2 (up to 21 rows), for a maximum of 37 rows.
    ui:
      title: Record of Experience
    body:
      enabled: false
      description: Unused. Each field maps to a column in the row.
    fields:
      date:
        type: date
        ui:
          group: Record
        description: Date of the action (column A).

      action:
        type: string
        ui:
          group: Record
        description: One type of action per line (column B).

      written_grade:
        type: string
        ui:
          group: Record
          compact: true
        description: Written grade, if applicable (column C).

      written_grade_date:
        type: date
        default: ""
        ui:
          group: Record
          compact: true
        description: Date of written grade (column D). Omit or leave blank when there is no written grade.

      positional_grade:
        type: string
        ui:
          group: Record
          compact: true
        description: Positional grade, if applicable (column E).

      positional_grade_date:
        type: date
        default: ""
        ui:
          group: Record
          compact: true
        description: Date of positional grade (column F). Omit or leave blank when there is no positional grade.

      auth_or_remarks:
        type: string
        ui:
          group: Record
        description: Authentication or remarks entry (column G).
